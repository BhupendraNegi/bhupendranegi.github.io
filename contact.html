---
layout: site_layout
quote: It is not the email you send which matters, but how people feel when they read it.
author: Katie Hopkinst
---

{% include quote.html quote=page.quote author=page.author %}

<section class="contact-page" aria-labelledby="contact-heading">
  <h2 id="contact-heading" class="heading big_heading center">Contact</h2>
  <form class="email_me contact-form site-card" action="https://formspree.io/f/xyzgbrae" method="POST" data-contact-form>
    <input type="text" name="_gotcha" hidden tabindex="-1" autocomplete="off" />

    <div class="contact-grid">
      <label class="contact-field" for="contact-name">
        <span class="contact-label"><i class="material-icons" aria-hidden="true">account_circle</i>Full Name</span>
        <input id="contact-name" type="text" name="name" class="validate email_input" autocomplete="name">
      </label>

      <label class="contact-field" for="contact-phone">
        <span class="contact-label"><i class="material-icons" aria-hidden="true">phone</i>Phone Number</span>
        <input id="contact-phone" name="phone" type="tel" pattern="^(?:\+91[- ]?)?[789]\d{9}$" class="validate email_input" autocomplete="tel">
      </label>

      <label class="contact-field" for="contact-email">
        <span class="contact-label"><i class="material-icons" aria-hidden="true">email</i>Email</span>
        <input id="contact-email" name="_replyto" type="email" class="validate email_input" autocomplete="email" required>
      </label>

      <label class="contact-field" for="contact-subject">
        <span class="contact-label"><i class="material-icons" aria-hidden="true">subject</i>Subject</span>
        <input id="contact-subject" type="text" name="_subject" class="email_input">
      </label>

      <label class="contact-field contact-field-full" for="contact-message">
        <span class="contact-label"><i class="material-icons" aria-hidden="true">mode_edit</i>Message</span>
        <textarea id="contact-message" aria-required="true" name="message" class="materialize-textarea email_input validate" required></textarea>
      </label>
    </div>

    <p class="contact-status center-align" aria-live="polite" data-contact-status></p>
    <div class="contact-actions">
      <button class="fill contact-submit" type="submit" name="action" data-contact-submit>Submit</button>
    </div>
  </form>

  <div id="email_modal" class="modal contact-success-modal" role="dialog" aria-modal="true" aria-labelledby="contact-success-title">
    <div class="modal-content">
      <h4 id="contact-success-title" class="center-align">Your email is on the way!</h4>
      <p class="center-align description">I usually reply fast</p>
    </div>
    <div class="contact-actions">
      <a class="button_wrapper modal-action modal-close site-button" href="#main-content">Back to site</a>
    </div>
  </div>
</section>
