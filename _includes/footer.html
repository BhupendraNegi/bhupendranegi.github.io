<footer class="site-footer">
  <div class="site-footer-inner">
    <p class="site-footer-copy">&copy; {{ site.time | date: "%Y" }} {{ site.name }}</p>
    <div class="site-footer-social" aria-label="Social links">
      <a class="site-footer-icon-link" target="_blank" rel="noopener" href="{{site.linked_in_link}}" aria-label="LinkedIn">{% include social-icon.html name="linkedin" class="footer_icons" %}</a>
      <a class="site-footer-icon-link" target="_blank" rel="noopener" href="{{site.github_link}}" aria-label="GitHub">{% include social-icon.html name="github" class="footer_icons" %}</a>
      <a class="site-footer-icon-link" target="_blank" rel="noopener" href="{{site.twitter_link}}" aria-label="X">{% include social-icon.html name="twitter" class="footer_icons" %}</a>
      <a class="site-footer-icon-link" href="mailto:{{site.email}}" aria-label="Email"><i data-lucide="mail" class="site-icon footer_icons" aria-hidden="true"></i></a>
    </div>
  </div>
</footer>
