<a href="{{ include.section.url }}" class="home-card home-card--{{ include.section.class }}">
  <span class="home-card-bg" aria-hidden="true"></span>
  <span class="home-card-overlay" aria-hidden="true"></span>
  <span class="home-card-content">
    <span class="home-card-heading">{{ include.section.heading }}</span>
    <span class="home-card-words">{{ include.section.words }}</span>
    <span class="home-card-cta">
      Explore <i class="site-icon" data-lucide="arrow-right" aria-hidden="true"></i>
    </span>
  </span>
</a>
