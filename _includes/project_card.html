<div id="{{project.id}}" class="modal modal-fixed-footer" aria-label="{{project.title}}">
  <div class="modal-content">
    <div class="carousel carousel-slider center auto-play" data-indicators="true">
      {% for image in project.images %}
      <div class="black-text carousel-item">
        <div class="image_wrapper">
          <img class="project_img" src="{{image}}" alt="">
        </div>
      </div>
      {% endfor %}
    </div>
    <div class="project_info">
      <div class="project-info-row">
        <div class="info_type">title:</div>
        <h4>{{project.title}}</h4>
      </div>
      <div class="project-info-row">
        <div class="info_type">description:</div>
        <p class="description">{{project.description}}</p>
      </div>
      <div class="project-info-row">
        <div class="info_type">skills:</div>
        <div class="project-tech-list">
          {% for tech in project.technologies %}
            <i class="devicon-{{tech}} project_icons"></i>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer project-modal-footer">
      <div class="buttons">
        {% if project.url %}
          <a class="button_wrapper site-button" target="_blank" rel="noopener" href="{{project.url}}">Live</a>
        {% else %}
          <span class="button_wrapper site-button is-disabled" aria-disabled="true">Live</span>
        {% endif %}
        <a class="button_wrapper site-button" target="_blank" rel="noopener" href="{{project.github_url}}">Github</a>
        <button id="{{project.id}}" class="next fill">Next</button>
      </div>
  </div>
</div>
