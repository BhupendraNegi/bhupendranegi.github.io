<article class="project project-card" data-tags="{{ project.tags | join: ',' }}">
  <img class="project-card-media" src="{{ project.cover }}" alt="" loading="lazy">
  <div class="cover project-cover {% cycle 'left', 'right'%}">
    <div class="project-cover-content">
      <h3>{{project.title}}</h3>
      <a class="site-button project-open-button modal-trigger" href="#{{project.id}}">Learn more</a>
    </div>
  </div>
  {% include project_card.html %}
</article>
