name: Build and deploy to GitHub Pages

# Builds the site with the repo's own Ruby (Jekyll 4.x) and Node (Tailwind CLI),
# so production matches local. Replaces GitHub's native branch-based Jekyll build.
# NOTE: In repo Settings -> Pages, set "Build and deployment" -> Source to
# "GitHub Actions" for this workflow to become the live deploy.

on:
  push:
    # `version-3` is here temporarily so the branch can be previewed live on the
    # Pages URL before merging. Remove it (leave only `main`) after the merge.
    branches: [main, version-3]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: .ruby-version
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Node packages
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build CSS and site
        env:
          JEKYLL_ENV: production
        run: |
          npm run css:build
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
