# /uses page content — the tools behind the work.
#
# Each group renders as a card. Per item:
#   name    (required) — the tool/thing
#   detail  (optional) — a short note
#   icon    (optional) — a Devicon class WITHOUT the leading "devicon-"
#                        (e.g. ruby-plain). Must exist in the loaded Devicon.
#   lucide  (optional) — a Lucide icon name, used when there is no Devicon glyph
#
# Lines marked <FILL IN> are placeholders — replace them with your real setup.

- group: Editor & Terminal
  icon: monitor # lucide icon for the group heading
  items:
    - name: RubyMine
      lucide: code-2
      detail: My main IDE for Ruby and Rails work.
    - name: VS Code
      icon: vscode-plain
      detail: For everything else, with the Claude Code extension.
    - name: iTerm2
      lucide: square-terminal
      detail: My everyday terminal.
    - name: Ghostty
      lucide: ghost
      detail: Fast GPU-accelerated terminal I'm trying out.
    - name: Shell
      lucide: terminal
      detail: zsh with Oh My Zsh.
    - name: Editor font
      lucide: type
      detail: JetBrains Mono.
    - name: Editor theme
      lucide: palette
      detail: Monokai Dark in VS Code.

- group: Languages & Runtimes
