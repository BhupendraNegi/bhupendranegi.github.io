<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div id="google_translate_element" class="translate-widget" aria-label="Translate this site"></div>

  <div id="barba-wrapper" class="site-shell">
    <div class="barba-container site-content">
      {{ content }}
    </div>
  </div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'hi,es,fr,de,ja,zh-CN,ar,pt',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
